<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>LYA — June 20, 2026 RSVP</title>
  <script async src="https://tally.so/widgets/embed.js"></script>
  <!--
    QR code destination — embeds the Tally RSVP form directly so the
    user stays on this URL throughout (the address bar shows
    donovansmith44.github.io/lutheran-young-adults/rsvp.html, not
    tally.so). Better UX than a redirect: no flash, no domain switch.

    The brochure's QR encodes THIS URL, not the Tally URL — so we can
    swap the form (or move to a different tool entirely) by editing
    the data-tally-src below and pushing. No reprint needed.

    Current target: Tally form for Personality Day (2026-06-20 RSVP).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #fff8f2; }
    iframe { position: absolute; top: 0; right: 0; bottom: 0; left: 0; border: 0; width: 100%; height: 100%; }
    .fallback {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #01404f;
      text-align: center;
      max-width: 24rem;
      padding: 0 1.25rem;
    }
    .fallback a { color: #01404f; font-weight: 600; }
  </style>
</head>
<body>
  <noscript>
    <div class="fallback">
      <p>The RSVP form needs JavaScript enabled. <a href="https://tally.so/r/Ek8QeA">Open the form directly here.</a></p>
    </div>
  </noscript>
  <iframe data-tally-src="https://tally.so/r/Ek8QeA?transparentBackground=1"
          width="100%" height="100%"
          frameborder="0" marginheight="0" marginwidth="0"
          title="LYA — June 20, 2026 RSVP"></iframe>
</body>
</html>
