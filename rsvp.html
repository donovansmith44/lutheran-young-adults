<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSVP — Lutheran Young Adults</title>
  <meta http-equiv="refresh" content="0; url=https://tally.so/r/Ek8QeA">

  <script>window.location.replace("https://tally.so/r/Ek8QeA");</script>
  <!--
    QR code destination — redirects to the Tally RSVP form.

    The brochure's QR encodes THIS URL, not the Tally URL directly,
    so we can change the form (or swap to a different tool entirely)
    without invalidating already-printed brochures. To repoint, just
    edit the redirect targets on the meta refresh, canonical link,
    JS replace, and the fallback <a href> below, then push.

    Current target: Tally form for Personality Day (2026-06-20 RSVP).
  -->
  <style>
    :root { --teal: #01404f; --cream: #fff8f2; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      max-width: 28rem;
      margin: 4rem auto;
      padding: 0 1.25rem;
      color: var(--teal);
      background: var(--cream);
      text-align: center;
      line-height: 1.5;
    }
    a { color: var(--teal); font-weight: 600; }
  </style>
</head>
<body>
  <p>Redirecting you to the RSVP form…</p>
  <p><a href="https://tally.so/r/Ek8QeA">Tap here if you aren't redirected automatically.</a></p>
</body>
