<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}} — Poster</title>
<link rel="stylesheet" href="poster.css">
</head>
<body class="bg-pink text-teal font-body">

<!-- ============================================================ -->
<!-- ONE-PAGE LANDSCAPE POSTER                                    -->
<!--   Sized for legibility from ~15 feet.                        -->
<!--   Layout: [ header band ] [ event band ] [ schedule | expect ] -->
<!-- ============================================================ -->
<div class="poster-page">

  <!-- HEADER: name centered, QR locked top-right -->
  <header class="poster-header">
    <div class="poster-name-block">
      <h1 class="poster-name">
        <span class="poster-name-l1">Lutheran</span>
        <span class="poster-name-l2">Young Adults</span>
      </h1>
      <div class="poster-tagline">{{SUBTITLE}}</div>
    </div>
    <div class="poster-qr-block">
      <img src="assets/qr-rsvp.svg" alt="RSVP QR code" class="poster-qr">
      <div class="poster-qr-cap">Scan to RSVP</div>
    </div>
  </header>

  <!-- EVENT BAND: date + title + location, second-loudest line -->
  <div class="poster-event-band">
    <span class="poster-event-date">{{EVENT_DATE}}</span>
    <span class="poster-event-dot">·</span>
    <span class="poster-event-title">{{EVENT_TITLE}}</span>
    <span class="poster-event-dot">·</span>
    <span class="poster-event-loc">{{EVENT_LOCATION}}</span>
  </div>

  <!-- BODY: two columns, schedule left, expect center -->
  <main class="poster-body">
    <section class="poster-col poster-col-schedule">
      <h2 class="poster-col-title">Event Schedule</h2>
      <ul class="poster-schedule-list">
        {{SCHEDULE_ROWS}}
      </ul>
    </section>

    <section class="poster-col poster-col-expect">
      <h2 class="poster-col-title">What to Expect</h2>
      <ul class="poster-expect-list">
        {{EXPECT_BULLETS}}
      </ul>
    </section>
  </main>

</div>

</body>
</html>
