<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}} — Poster</title>
<link rel="stylesheet" href="poster.css">
</head>
<body class="bg-white text-teal font-body">

<!-- ============================================================ -->
<!-- ONE-PAGE LANDSCAPE POSTER                                    -->
<!--   A flattened, unfoldable version of the brochure for parish  -->
<!--   offices to photocopy and hand out. White stock, teal ink    -->
<!--   only — no solid color blocks, cheap to print.               -->
<!--                                                               -->
<!--   Masthead:  [logo]      LUTHERAN YOUNG ADULTS     [contact]   -->
<!--   Columns:   Our Mission  |  Event Schedule  |  What to Expect -->
<!-- ============================================================ -->
<div class="poster-page">

  <!-- ========== MASTHEAD ========== -->
  <header class="masthead">
    <img src="assets/logo.png" alt="" class="mast-logo">

    <div class="mast-title">
      <div class="t1">{{GROUP_NAME_UPPER}}</div>
      <div class="t2">{{SUBTITLE}}</div>
    </div>

    <aside class="mast-contact">
      <div class="contact-rsvp">Scan to RSVP</div>
      <img src="assets/qr-rsvp.svg" alt="RSVP QR code" class="contact-qr">
      <div class="contact-tally">tally.so/r/Ek8QeA</div>
      <div class="contact-line contact-phone">(614) 556-0607</div>
      <div class="contact-line contact-email">donovan.smith44@gmail.com</div>
    </aside>
  </header>

  <!-- ========== THREE PANELS ========== -->
  <div class="panels">

    <!-- ---------- LEFT: OUR MISSION / CONNECTION ---------- -->
    <section class="panel panel-mission">
      <div class="col-head">
        <div class="col-eyebrow">Our Mission</div>
        <div class="col-name">Connection</div>
      </div>
      <blockquote class="mission-scripture">
        <p class="quote-text">&ldquo;{{SCRIPTURE}}&rdquo;</p>
        <cite>({{SCRIPTURE_CITE}})</cite>
      </blockquote>
      <div class="mission-divider"></div>
      <div class="mission-body">
        <p class="mission-salutation">{{SALUTATION}}</p>
        {{MISSION}}
      </div>
    </section>

    <!-- ---------- MIDDLE: EVENT SCHEDULE (featured event) ---------- -->
    <section class="panel panel-schedule">
      <div class="col-head">
        <div class="col-name">Our First Gathering</div>
      </div>
      <div class="events-list">
        {{FEATURED_EVENT}}
      </div>
    </section>

    <!-- ---------- RIGHT: UPCOMING GATHERINGS ---------- -->
    <section class="panel panel-upcoming">
      <div class="col-head">
        <div class="col-name">Upcoming Gatherings</div>
      </div>
      <div class="events-list">
        {{UPCOMING_EVENTS}}
      </div>
    </section>

  </div>

</div>

</body>
</html>
