<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}} — Poster</title>
<link rel="stylesheet" href="poster.css">
</head>
<body class="bg-pink text-teal font-body">

<!-- ============================================================ -->
<!-- ONE-PAGE LANDSCAPE POSTER — v2                                -->
<!--   Hero advertises the EVENT and the FIRST-EVER framing,      -->
<!--   not the group brand. Scripture pullquote + free-dinner     -->
<!--   callout sit beneath as twin emotional + practical anchors.  -->
<!--   Schedule lives in a compact footer strip.                  -->
<!-- ============================================================ -->
<div class="poster-page">

  <!-- HEADER STRIP: group identity left, QR right -->
  <header class="poster-header">
    <div class="poster-id">
      <div class="poster-id-name">{{GROUP_NAME_UPPER}}</div>
      <div class="poster-id-tag">{{SUBTITLE}}</div>
    </div>
    <div class="poster-qr-block">
      <img src="assets/qr-rsvp.svg" alt="RSVP QR code" class="poster-qr">
      <div class="poster-qr-cap">Scan to RSVP</div>
    </div>
  </header>

  <!-- HERO: eyebrow → event title → date/location -->
  <section class="poster-hero">
    <div class="poster-eyebrow">
      <span class="rule"></span>
      <span class="eyebrow-text">{{EYEBROW}}</span>
      <span class="rule"></span>
    </div>
    <h1 class="poster-hero-title">{{EVENT_TITLE_BIG}}</h1>
    <div class="poster-hero-meta">{{EVENT_META_LINE}}</div>
  </section>

  <!-- ANCHOR ROW: scripture pullquote (left) + free-dinner callout (right) -->
  <section class="poster-anchors">
    <blockquote class="poster-scripture">
      <p class="quote-text">&ldquo;{{SCRIPTURE_PULLQUOTE}}&rdquo;</p>
      <cite>{{SCRIPTURE_CITE_POSTER}}</cite>
    </blockquote>
    <aside class="poster-callout">
      <div class="callout-eyebrow">{{CALLOUT_EYEBROW}}</div>
      <div class="callout-headline">{{CALLOUT_HEADLINE}}</div>
      <div class="callout-sub">{{CALLOUT_SUB}}</div>
    </aside>
  </section>

  <!-- SCHEDULE FOOTER STRIP -->
  <footer class="poster-schedule-strip">
    <ul class="strip-rows">
      {{SCHEDULE_ROWS_POSTER}}
    </ul>
  </footer>

</div>

</body>
</html>
