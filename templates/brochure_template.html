<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}} — Brochure</title>
<link rel="stylesheet" href="brochure.css">
</head>
<body class="bg-pink text-teal font-body">

<!-- ========================================================== -->
<!-- OUTSIDE FACE                                                 -->
<!--   Panels printed L->R:  [ TUCK | BACK COVER | FRONT COVER ] -->
<!--   When folded: front cover is on top; back cover underneath -->
<!-- ========================================================== -->
<div class="brochure-page outside">

  <!-- LEFT: tuck panel (tucks inside when folded; intentionally blank) -->
  <section class="panel panel-tuck">
    <div class="panel-inner tuck-inner"></div>
  </section>

  <!-- MIDDLE: back cover (seen when brochure is closed, flipped over) -->
  <section class="panel panel-back">
    <div class="panel-inner back-inner">
      <img src="assets/logo.png" alt="" class="back-logo">
      <div class="back-church">Zion Evangelical<br>Lutheran Church</div>
      <div class="back-divider"></div>
      <div class="back-phone">(614) 556-0607</div>
      <div class="back-tagline">Locations vary by event</div>
    </div>
  </section>

  <!-- RIGHT: front cover (seen when folded closed, the first page people see) -->
  <section class="panel panel-front">
    <div class="panel-inner front-inner">
      <img src="assets/logo.png" alt="" class="front-logo">
      <h1 class="front-title">{{TITLE_UPPER}}</h1>
      <div class="front-subtitle">{{SUBTITLE}}</div>
    </div>
  </section>

</div>

<!-- ========================================================== -->
<!-- INSIDE FACE                                                  -->
<!--   [ SCHEDULE | ONE PHOTO | SCRIPTURE ]                      -->
<!-- ========================================================== -->
<div class="brochure-page inside">

  <section class="panel panel-schedule">
    <div class="panel-inner">
      <div class="panel-heading">
        <div class="panel-heading-eyebrow">2026</div>
        <div class="panel-heading-title">Event Schedule</div>
      </div>
      <div class="events-list">
        {{EVENTS}}
      </div>
    </div>
  </section>

  <section class="panel panel-photo">
    <div class="panel-inner">
      <div class="photo-frame">
        <span class="photo-caption">Drop a photo here — replace <code>assets/photo.jpg</code></span>
      </div>
    </div>
  </section>

  <section class="panel panel-verse">
    <div class="panel-inner">
      <blockquote class="scripture-hero">
        <p class="quote-text">&ldquo;{{SCRIPTURE}}&rdquo;</p>
        <cite>{{SCRIPTURE_CITE}}</cite>
      </blockquote>
      <div class="verse-divider"></div>
      <div class="verse-mission">
        <p class="salutation">{{SALUTATION}}</p>
        {{MISSION}}
        <p class="signoff">In Christ,<span class="name">Lutheran Young Adults</span></p>
      </div>
    </div>
  </section>

</div>

</body>
</html>
