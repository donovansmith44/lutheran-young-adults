<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="flyer.css">
</head>
<body class="bg-pink text-teal font-body">

<div class="page">

  <!-- ========== TOP BANNER ========== -->
  <header class="banner">
    <div class="banner-title">
      <div class="t1">{{TITLE_UPPER}}</div>
      <div class="t2">Event Schedule</div>
    </div>
    <div class="banner-logo">
      <span class="rule"></span>
      <img src="assets/logo.png" alt="" class="logo">
      <span class="rule"></span>
    </div>
  </header>

  <!-- ========== 2-COL BODY ========== -->
  <div class="body-grid">

    <main class="schedule">
      {{EVENTS}}
    </main>

    <aside class="aside">
      <blockquote class="scripture-hero">
        <p class="quote-text">{{SCRIPTURE}}</p>
        <cite>{{SCRIPTURE_CITE}}</cite>
      </blockquote>

      <div class="aside-rule"></div>

      <div class="mission">
        <p class="salutation">{{SALUTATION}}</p>
        {{MISSION}}
      </div>
    </aside>

  </div>

  <!-- ========== CONTACT BOX ========== -->
  <footer class="contact-box">
    <div class="row"><div class="label">Event Organizer</div><div class="val">Zion Evangelical Lutheran Church</div></div>
    <div class="row"><div class="label">Location</div><div class="val">Varies by event</div></div>
    <div class="row"><div class="label">Contact</div><div class="val">(614) 556-0607</div></div>
  </footer>

</div>

</body>
</html>
